services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    labels:
      com.degenwarrior.project: "degenwarrior-marketing"
      com.degenwarrior.service: "database"
      com.degenwarrior.environment: "production"
      org.opencontainers.image.title: "Degen Warrior Postgres"
      org.opencontainers.image.description: "Postgres database for the Degen Warrior marketing site"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-degen}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set a real password in .env}
      POSTGRES_DB: ${POSTGRES_DB:-degen_warrior_site}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-degen}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    labels:
      com.degenwarrior.project: "degenwarrior-marketing"
      com.degenwarrior.service: "cache"
      com.degenwarrior.environment: "production"
      org.opencontainers.image.title: "Degen Warrior Redis"
      org.opencontainers.image.description: "Redis cache / rate-limiter store for the Degen Warrior marketing site"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  degenwarrior-app:
    build:
      context: .
      target: runner
    restart: unless-stopped
    container_name: degenwarrior-app
    labels:
      com.degenwarrior.project: "degenwarrior-marketing"
      com.degenwarrior.service: "web"
      com.degenwarrior.service-name: "degenwarrior-app"
      com.degenwarrior.environment: "production"
      org.opencontainers.image.title: "Degen Warrior Web"
      org.opencontainers.image.description: "Next.js marketing site + admin dashboard for Degen Warrior (pre-launch)"
      org.opencontainers.image.source: "https://github.com/gtsinnovation/degenwarrior"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER:-degen}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-degen_warrior_site}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:?set a real secret in .env}
    expose:
      - "3000"

  # One-shot migration/seed runner — applies schema.sql, seeds roadmap
  # phases + demo posts, and creates the first admin user, then exits.
  # Run with: docker compose run --rm migrate
  migrate:
    build:
      context: .
      target: migrator
    profiles: ["tools"]
    labels:
      com.degenwarrior.project: "degenwarrior-marketing"
      com.degenwarrior.service: "migration"
      com.degenwarrior.environment: "production"
      org.opencontainers.image.title: "Degen Warrior DB Migrate"
      org.opencontainers.image.description: "One-shot schema + seed + admin-user bootstrap job"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-degen}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-degen_warrior_site}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@degenwarrior.io}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:?set a real admin password in .env}

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    labels:
      com.degenwarrior.project: "degenwarrior-marketing"
      com.degenwarrior.service: "reverse-proxy"
      com.degenwarrior.environment: "production"
      org.opencontainers.image.title: "Degen Warrior Caddy"
      org.opencontainers.image.description: "Reverse proxy + automatic HTTPS for www.degenwarrior.io"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - degenwarrior-app

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
